<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3d98a"/>
      <stop offset="50%" stop-color="#cfa44c"/>
      <stop offset="100%" stop-color="#a9822f"/>
